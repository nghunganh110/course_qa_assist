# ──────────────────────────────────────────────
# Course QA Assistant - Pipeline Configuration
# ──────────────────────────────────────────────

llm:
  provider: ollama
  model: mistral:7b
  temperature: 0.0
  top_p: 0.9
  num_ctx: 4096

embeddings:
  provider: ollama
  model: mxbai-embed-large
  registry_key: mxbai_large

chunking:
  strategy: recursive
  chunk_size: 1000
  chunk_overlap: 200
  separators:
    - "\n\n"
    - "\n"
    - " "
    - ""

vectorstore:
  provider: chroma
  persist_directory: ./vectorstore/chroma_db
  collection_name: course_qa

retrieval:
  strategy: hybrid
  dense:
    search_type: similarity
    k: 10
    fetch_k: 20
    lambda_mult: 0.7
  sparse:
    k: 10
  hybrid:
    weights: [0.5, 0.5]
  final_k: 5

reranking:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5

query_translation:
  enabled: false
  strategy: none
  multi_query:
    num_queries: 3
  hyde:
    num_generations: 1

routing:
  enabled: false
  strategy: semantic
  collections:
    - name: theoretical
      description: "Lecture notes, concepts, textbook chapters, academic papers"
    - name: practical
      description: "Homework, code examples, assignments, tutorials"
    - name: administrative
      description: "Syllabus, grading, schedules, logistics, policies"

generation:
  prompt_template: |
    You are a helpful teaching assistant. Answer the student's question
    using ONLY the provided lecture notes and course materials.
    If the materials don't contain enough information, say so clearly.
    Be accurate, concise, and explain concepts in a way that helps
    the student understand.

    Context:
    {context}

    Question: {question}

    Answer:

evaluation:
  dataset_path: ./data/evaluation/benchmark_retrieval.json
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall

# Lecture notes configuration
lectures:
  directory: ./data/lectures
  course_name: "default"
  supported_formats:
    - .pdf
    - .docx
    - .pptx
    - .txt
    - .md
